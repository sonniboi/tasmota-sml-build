name: Build Tasmota SML (1MB)

on:
  workflow_dispatch:
    inputs:
      tasmota_tag:
        description: 'Tasmota release tag (e.g. v15.3.0)'
        required: true
        default: 'v15.3.0'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Tasmota
        uses: actions/checkout@v4
        with:
          repository: arendst/Tasmota
          ref: ${{ github.event.inputs.tasmota_tag }}
          fetch-depth: 1

      - name: Inject user_config_override.h
        uses: actions/checkout@v4
        with:
          path: _this
          fetch-depth: 1

      - name: Copy override
        run: cp _this/user_config_override.h tasmota/user_config_override.h

      - uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ github.event.inputs.tasmota_tag }}

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build tasmota (1MB, SML)
        run: pio run -e tasmota

      - name: Rename binary
        run: |
          cp build_output/firmware/tasmota.bin.gz tasmota-sml.bin.gz
          cp build_output/firmware/tasmota.bin tasmota-sml.bin

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tasmota_tag }}
          name: "Tasmota ${{ github.event.inputs.tasmota_tag }} SML"
          body: |
            Tasmota firmware build with SML support for 1MB ESP8266 devices (e.g. Sonoff Basic, ESP-01).

            Based on [Tasmota ${{ github.event.inputs.tasmota_tag }}](https://github.com/arendst/Tasmota/releases/tag/${{ github.event.inputs.tasmota_tag }}) with `USE_SCRIPT` + `USE_SML_M` enabled.

            ## OTA Update
            ```
            OtaUrl https://github.com/${{ github.repository }}/releases/download/${{ github.event.inputs.tasmota_tag }}/tasmota-sml.bin.gz
            Upgrade 1
            ```

            > **Note for 1MB devices:** File upload via web UI may fail ("Not enough space").
            > Use the OTA URL method above — the device downloads directly.
          files: |
            tasmota-sml.bin.gz
            tasmota-sml.bin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
